; platformio.ini — BLE Scanner Tool
; Flash : pio run -e ble_scanner -t upload
; Monitor : pio device monitor -b 115200

[env:ble_scanner]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0

build_flags =
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -D CONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=0

; Source uniquement le scanner (pas le main.cpp du projet)
src_filter = -<*> +<../tools/ble_scanner.cpp>
