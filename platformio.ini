; Van Dashboard - ESP32 + LVGL + JKBMS BLE + Victron BLE
; Platforme : ESP32 (WROOM-32 ou WROVER)
; Ecran     : TFT 480x320 (ILI9341) via TFT_eSPI
; BLE       : NimBLE-Arduino

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ----- Flash / RAM -----
board_build.partitions = huge_app.csv

; ----- Frequence CPU -----
board_build.f_cpu = 240000000L

; ----- Libraries -----
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2
    lvgl/lvgl @ ^8.3.11
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^6.21.5
    arduino-libraries/NTPClient @ ^3.2.1
	nimble/A NimBLE-Arduino@^1.4.2

; ----- Compilation flags -----
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=0
    ; TFT_eSPI : choisir le driver selon votre ecran
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTOUCH_CS=15
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; LVGL config
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_CONF_PATH=\"lv_conf.h\"
    ; Taille du buffer LVGL (lignes x largeur x 2 octets/pixel)
    -DLV_BUF_LINES=20
    ; Stack size
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192

[env:esp32_lvgl]
extends = env
board = esp32dev
build_flags = -DDISPLAY_TFT_ILI9341
lib_extra_dirs = lib

[env:esp32s3_ws7b]
extends = env
board = esp32-s3-lcd-ev-board
build_flags =
    -DDISPLAY_WS7_1024x600
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSPIRAM_CONFIG=1
    -DSPIRAM_USE_MALLOC=1
lib_deps =
    ${env.lib_deps}
    waveshare/esp32-s3-lcd-ev-board@^1.0.0
	
; ----- Upload -----
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
