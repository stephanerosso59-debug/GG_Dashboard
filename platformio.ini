; ═══════════════════════════════════════════════════════════════════
;  workspace_lvgl/platformio.ini
;  ESP32 + TFT ILI9341 480x320 + LVGL 8.x
;  Affichage tactile haute definition avec animations
; ═══════════════════════════════════════════════════════════════════
[env:esp32_lvgl]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Flash partitioning ──────────────────────────────────────────
board_build.partitions = huge_app.csv
board_build.f_cpu      = 240000000L

; ── Libraries ───────────────────────────────────────────────────
lib_deps =
    h2zero/NimBLE-Arduino   	@ ^1.4.2
    lvgl/lvgl               	@ ^8.3.11
    lvgl/lvgl 					@ ^8.3.9
    adafruit/Adafruit BME280 Library @ ^2.6.8
    adafruit/Adafruit Unified Sensor @ ^1.1.9
	bodmer/TFT_eSPI          @ ^2.5.43
    bblanchon/ArduinoJson    @ ^6.21.5
    arduino-libraries/NTPClient @ ^3.2.1
    mikalhart/TinyGPSPlus    @ ^1.0.3

; ── Sources supplementaires (shared BLE + meteo) ────────────────
; lib_extra_dirs traite ../shared comme librairie PlatformIO
; Les headers sont aussi accessibles via include_dirs
lib_extra_dirs   = ../shared
build_src_filter = +<*> +<../../shared/ble/*.cpp> +<../../shared/weather/*.cpp> +<../../shared/water/*.cpp>

; ── Flags de compilation ────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=0
    ; ── TFT ILI9341 ──
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTOUCH_CS=-1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; ── LVGL : lv_conf.h est dans src/ -> accessible directement ──
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_BUF_LINES=20
    ; ── Include paths ──
    -I src
    -I ../shared
    ; ── Stack ──
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    ; ── Workspace marker ──
    -DWORKSPACE_LVGL=1

; ── Upload / Monitor ────────────────────────────────────────────
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
